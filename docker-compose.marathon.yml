services:
  marathon:
    build:
      context: .
      dockerfile: Dockerfile.web
      target: serve
    container_name: agentic-marathon
    volumes:
      # Mount Marathon 2 game data
      - ../alephone/data/Scenarios/Marathon 2/Map.sceA:/data/Map.sceA:ro
      - ../alephone/data/Scenarios/Marathon 2/Shapes.shpA:/data/Shapes.shpA:ro
      - "../alephone/data/Scenarios/Marathon 2/Physics Models/Standard.phyA:/data/Physics.phyA:ro"
    expose:
      - "80"
    networks:
      - proxy-net
    restart: unless-stopped

networks:
  proxy-net:
    external: true
